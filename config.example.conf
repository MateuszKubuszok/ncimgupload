nextcloud {
  url = "https://cloud.example.com"
  username = "youruser"
  # App password — generate in Nextcloud: Settings > Security > App passwords
  # Can also be set via NKUPLOAD_PASSWORD env var
  password = "xxxxx-xxxxx-xxxxx-xxxxx-xxxxx"
}

paths {
  # Paths on phone to scan (relative to /storage/emulated/0/)
  phone = ["DCIM/Camera"]
  # Destination in Nextcloud (relative to user's file root)
  cloud = "Photos/Phone"
  # When using sync-folder mode: local folder synced by Nextcloud desktop client
  # sync-folder = "/Users/you/Nextcloud/Photos/Phone"
  # File extensions to include (case-insensitive)
  extensions = [".jpg", ".jpeg", ".png", ".mp4", ".mov", ".heic", ".heif", ".webp", ".gif", ".3gp", ".mkv", ".avi"]
}

upload {
  # Files larger than this use chunked upload (bytes). Default 100MB.
  chunk-threshold = 104857600
  # Size of each chunk (bytes). Default 10MB.
  chunk-size = 10485760
  # Upload retries on failure
  retries = 3
  # Verify via checksum after upload
  verify-checksum = true
  # Transfer mode: "webdav" (direct API upload) or "sync-folder" (drop into synced folder)
  mode = "webdav"
}

cleanup {
  # Default: dry-run. Must pass --yes to actually delete.
  dry-run = true
  # Only delete files whose checksum has been verified in the cloud
  verified-only = true
}

adb {
  # Auto-detected if on PATH. Override here if needed.
  # path = "/opt/homebrew/bin/adb"
  # Device serial if multiple devices connected
  # device = "XXXXXXXXX"
}
